<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VibeStream - Realtime Social Wall</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap"
      rel="stylesheet" />
    <style>
      body {
        font-family: "Plus+Jakarta+Sans", sans-serif;
        background-color: #0f172a;
        color: #f8fafc;
      }
      .vibe-card {
        transition:
          transform 0.2s ease,
          box-shadow 0.2s ease;
      }
      .vibe-card:hover {
        transform: translateY(-4px);
      }
      .loading-spinner {
        border: 3px solid rgba(255, 255, 255, 0.1);
        border-radius: 50%;
        border-top: 3px solid #3b82f6;
        width: 24px;
        height: 24px;
        animation: spin 1s linear infinite;
      }
      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body class="min-h-screen pb-20">
    <!-- Header -->
    <header
      class="sticky top-0 z-50 bg-slate-900/80 backdrop-blur-md border-b border-slate-800 p-4">
      <div class="max-w-5xl mx-auto flex justify-between items-center">
        <h1
          class="text-2xl font-800 tracking-tight bg-gradient-to-r from-blue-400 to-emerald-400 bg-clip-text text-transparent">
          VIBESTREAM
        </h1>
        <div
          id="auth-status"
          class="text-sm text-slate-400 flex items-center gap-2">
          <span id="user-display">Connecting...</span>
        </div>
      </div>
    </header>

    <main class="max-w-5xl mx-auto p-6">
      <!-- Input Area -->
      <section
        class="mb-12 bg-slate-800/50 p-6 rounded-2xl border border-slate-700 shadow-xl">
        <div class="flex flex-col gap-4">
          <textarea
            id="vibe-input"
            placeholder="What's the vibe?"
            class="w-full bg-slate-900 border border-slate-700 rounded-xl p-4 text-lg focus:ring-2 focus:ring-blue-500 focus:outline-none transition-all resize-none h-24"
            maxlength="280"></textarea>

          <div class="flex flex-wrap items-center justify-between gap-4">
            <div class="flex gap-2" id="vibe-selectors">
              <button
                data-color="blue"
                class="vibe-btn w-8 h-8 rounded-full bg-blue-500 ring-2 ring-offset-2 ring-offset-slate-800 ring-transparent"></button>
              <button
                data-color="purple"
                class="vibe-btn w-8 h-8 rounded-full bg-purple-500 ring-offset-2 ring-offset-slate-800"></button>
              <button
                data-color="emerald"
                class="vibe-btn w-8 h-8 rounded-full bg-emerald-500 ring-offset-2 ring-offset-slate-800"></button>
              <button
                data-color="rose"
                class="vibe-btn w-8 h-8 rounded-full bg-rose-500 ring-offset-2 ring-offset-slate-800"></button>
              <button
                data-color="amber"
                class="vibe-btn w-8 h-8 rounded-full bg-amber-500 ring-offset-2 ring-offset-slate-800"></button>
            </div>

            <button
              id="post-btn"
              class="bg-blue-600 hover:bg-blue-500 px-8 py-3 rounded-xl font-bold transition-all disabled:opacity-50 flex items-center gap-2">
              Post Vibe
            </button>
          </div>
        </div>
      </section>

      <!-- Feed -->
      <div
        id="feed"
        class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
        <!-- Dynamic content here -->
        <div
          class="col-span-full flex justify-center py-20"
          id="initial-loader">
          <div class="loading-spinner"></div>
        </div>
      </div>
    </main>

    <!-- Custom Toast Notification -->
    <div
      id="toast"
      class="fixed bottom-6 right-6 translate-y-20 opacity-0 transition-all duration-300 bg-slate-800 border border-slate-700 p-4 rounded-xl shadow-2xl flex items-center gap-3">
      <span id="toast-msg"></span>
    </div>

    <!-- FIREBASE MODULES -->
    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
      import {
        getAuth,
        signInAnonymously,
        onAuthStateChanged,
        signInWithCustomToken,
      } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
      import {
        getFirestore,
        collection,
        addDoc,
        onSnapshot,
        query,
        serverTimestamp,
        orderBy,
        deleteDoc,
        doc,
      } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

      /**
       * FIREBASE INSTRUCTIONS:
       * 1. The code automatically detects if it's running in an environment with global Firebase configs.
       * 2. If you are running this locally:
       * - Replace 'const firebaseConfig = ...' with the config from your Firebase Console (Project Settings > General).
       */
      const firebaseConfig = {
        apiKey: "AIzaSyDoIMjIKR4xEZhPgmWfIgbz4UyL9K2Waps",
        authDomain: "vibes-f20c1.firebaseapp.com",
        projectId: "vibes-f20c1",
        storageBucket: "vibes-f20c1.firebasestorage.app",
        messagingSenderId: "358860734806",
        appId: "1:358860734806:web:5a7bdda842c4c5535d56f7",
        measurementId: "G-LCCK4XJS7L",
      };

      const appId =
        typeof __app_id !== "undefined" ? __app_id : "vibe-stream-app";

      // Initialize Firebase
      const app = initializeApp(firebaseConfig);
      const auth = getAuth(app);
      const db = getFirestore(app);

      // State
      let currentUser = null;
      let selectedColor = "blue";

      // DOM Elements
      const feed = document.getElementById("feed");
      const postBtn = document.getElementById("post-btn");
      const vibeInput = document.getElementById("vibe-input");
      const userDisplay = document.getElementById("user-display");
      const toast = document.getElementById("toast");
      const toastMsg = document.getElementById("toast-msg");

      // UI Helpers
      const showToast = (msg) => {
        toastMsg.textContent = msg;
        toast.classList.remove("translate-y-20", "opacity-0");
        setTimeout(
          () => toast.classList.add("translate-y-20", "opacity-0"),
          3000,
        );
      };

      const updateSelectedColor = (color) => {
        selectedColor = color;
        document.querySelectorAll(".vibe-btn").forEach((btn) => {
          if (btn.dataset.color === color) {
            btn.classList.add("ring-2", "ring-blue-400");
          } else {
            btn.classList.remove("ring-2", "ring-blue-400");
          }
        });
      };

      // Firebase Auth Logic (Follow Rule 3)
      const initAuth = async () => {
        try {
          if (
            typeof __initial_auth_token !== "undefined" &&
            __initial_auth_token
          ) {
            await signInWithCustomToken(auth, __initial_auth_token);
          } else {
            await signInAnonymously(auth);
          }
        } catch (err) {
          console.error("Auth Error:", err);
          showToast("Connection failed. Check console.");
        }
      };

      onAuthStateChanged(auth, (user) => {
        currentUser = user;
        if (user) {
          userDisplay.textContent = `User: ${user.uid.substring(0, 6)}`;
          startStream(); // Only start listening once authenticated
        }
      });

      // Firestore Logic (Follow Rule 1 & 2)
      const startStream = () => {
        // Path: /artifacts/{appId}/public/data/vibes
        const vibesRef = collection(
          db,
          "artifacts",
          appId,
          "public",
          "data",
          "vibes",
        );

        // We follow Rule 2: Fetch all, then sort in JS if needed
        // But basic orderBy on serverTimestamp is usually safe for non-compound indexes
        const q = query(vibesRef, orderBy("createdAt", "desc"));

        onSnapshot(
          q,
          (snapshot) => {
            document.getElementById("initial-loader")?.remove();

            if (snapshot.empty && feed.children.length === 0) {
              feed.innerHTML = `
                        <div class="col-span-full text-center py-12 text-slate-500 border-2 border-dashed border-slate-800 rounded-3xl">
                            No vibes yet. Be the first to share!
                        </div>
                    `;
              return;
            }

            const vibes = [];
            snapshot.forEach((doc) =>
              vibes.push({ id: doc.id, ...doc.data() }),
            );
            renderFeed(vibes);
          },
          (error) => {
            console.error("Snapshot error:", error);
            showToast("Error loading feed.");
          },
        );
      };

      const postVibe = async () => {
        const text = vibeInput.value.trim();
        if (!text || !currentUser) return;

        postBtn.disabled = true;
        postBtn.innerHTML = `<div class="loading-spinner"></div>`;

        try {
          const vibesRef = collection(
            db,
            "artifacts",
            appId,
            "public",
            "data",
            "vibes",
          );
          await addDoc(vibesRef, {
            text: text,
            color: selectedColor,
            userId: currentUser.uid,
            createdAt: serverTimestamp(),
          });

          vibeInput.value = "";
          showToast("Vibe sent to the stream!");
        } catch (err) {
          console.error("Post error:", err);
          showToast("Couldn't post vibe.");
        } finally {
          postBtn.disabled = false;
          postBtn.textContent = "Post Vibe";
        }
      };

      const deleteVibe = async (id) => {
        try {
          const vibeDoc = doc(
            db,
            "artifacts",
            appId,
            "public",
            "data",
            "vibes",
            id,
          );
          await deleteDoc(vibeDoc);
          showToast("Vibe deleted.");
        } catch (err) {
          showToast("Couldn't delete.");
        }
      };

      // Render Function
      const renderFeed = (vibes) => {
        const colorMap = {
          blue: "from-blue-500/20 to-blue-600/10 border-blue-500/30 text-blue-100",
          purple:
            "from-purple-500/20 to-purple-600/10 border-purple-500/30 text-purple-100",
          emerald:
            "from-emerald-500/20 to-emerald-600/10 border-emerald-500/30 text-emerald-100",
          rose: "from-rose-500/20 to-rose-600/10 border-rose-500/30 text-rose-100",
          amber:
            "from-amber-500/20 to-amber-600/10 border-amber-500/30 text-amber-100",
        };

        feed.innerHTML = vibes
          .map(
            (vibe) => `
                <div class="vibe-card bg-gradient-to-br ${colorMap[vibe.color] || colorMap.blue} p-6 rounded-2xl border flex flex-col justify-between min-h-[160px] relative overflow-hidden group">
                    <p class="text-lg leading-relaxed z-10">${vibe.text}</p>
                    <div class="flex justify-between items-center mt-4 z-10">
                        <span class="text-[10px] uppercase tracking-widest opacity-50">
                            ${vibe.createdAt ? new Date(vibe.createdAt.seconds * 1000).toLocaleTimeString() : "Just now"}
                        </span>
                        ${
                          vibe.userId === currentUser?.uid
                            ? `
                            <button onclick="window.deleteVibe('${vibe.id}')" class="text-[10px] hover:text-white opacity-0 group-hover:opacity-100 transition-opacity bg-slate-900/50 px-2 py-1 rounded">
                                DELETE
                            </button>
                        `
                            : ""
                        }
                    </div>
                    <!-- Decorative Circle -->
                    <div class="absolute -right-4 -bottom-4 w-20 h-20 bg-white/5 rounded-full blur-2xl"></div>
                </div>
            `,
          )
          .join("");
      };

      // Event Listeners
      postBtn.addEventListener("click", postVibe);

      document
        .getElementById("vibe-selectors")
        .addEventListener("click", (e) => {
          if (e.target.dataset.color) {
            updateSelectedColor(e.target.dataset.color);
          }
        });

      // Initialize
      updateSelectedColor("blue");
      initAuth();

      // Make delete function global for the onclick handler
      window.deleteVibe = deleteVibe;
    </script>
  </body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PHP in the Browser (WASM)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .loader {
            border-top-color: #4f46e5;
            animation: spinner 1.5s linear infinite;
        }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col items-center justify-center">

    <!-- Loading State -->
    <div id="loading-screen" class="text-center space-y-4 p-6">
        <div class="loader ease-linear rounded-full border-4 border-t-4 border-slate-200 h-12 w-12 mb-4 mx-auto"></div>
        <h2 class="text-xl font-semibold text-slate-700">Initializing PHP WASM...</h2>
        <p class="text-slate-500 text-sm max-w-xs mx-auto">Downloading the PHP 8.2 binary. This may take a moment depending on your connection.</p>
    </div>

    <script type="module">
        // Using esm.sh instead of jsdelivr to handle nested dependency resolution (@php-wasm/universal)
        import { PHP } from 'https://esm.sh/@php-wasm/web@0.0.9';

        async function runPhp() {
            try {
                // 1. Initialize the PHP WebAssembly instance
                const php = await PHP.load('8.2');

                // 2. Define the PHP/HTML code
                const phpCode = `
<?php
$status = "WASM RUNTIME ACTIVE";
$version = phpversion();
$answers = ["It is certain.", "Definitely.", "Ask again later.", "Outlook not so good.", "Very doubtful."];
$selected = $answers[array_rand($answers)];
?>
<div class="bg-slate-50 min-h-screen p-4 md:p-8 font-sans">
    <div class="max-w-4xl w-full mx-auto space-y-6">
        <header class="bg-white rounded-2xl shadow-sm p-6 border border-slate-200 flex flex-col md:flex-row md:items-center justify-between gap-4">
            <div>
                <h1 class="text-2xl font-bold text-indigo-600">PHP WASM Diagnostic</h1>
                <p class="text-slate-500 text-sm">Executing PHP client-side via WebAssembly.</p>
            </div>
            <div class="inline-flex items-center gap-2 px-3 py-1 bg-blue-100 text-blue-700 rounded-full text-xs font-semibold self-start">
                <span class="relative flex h-2 w-2">
                    <span class="relative inline-flex rounded-full h-2 w-2 bg-blue-500"></span>
                </span>
                <?php echo $status; ?>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <section class="bg-white rounded-2xl shadow-sm p-6 border border-slate-200">
                <h2 class="text-lg font-semibold mb-4 text-slate-800">🔮 Logic Test</h2>
                <div class="p-4 rounded-xl bg-indigo-50 border border-indigo-100">
                    <p class="text-xs uppercase tracking-wider text-indigo-400 mb-1 font-bold">Randomized Answer:</p>
                    <p class="text-xl font-medium text-indigo-900 italic">"<?php echo $selected; ?>"</p>
                </div>
                <button onclick="location.reload()" class="mt-4 w-full bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-2 rounded-lg text-sm transition-colors">
                    Rerender Logic
                </button>
            </section>

            <section class="bg-white rounded-2xl shadow-sm p-6 border border-slate-200">
                <h2 class="text-lg font-semibold mb-4 text-slate-800">⚙️ Environment</h2>
                <div class="space-y-3 text-sm">
                    <div class="flex justify-between border-b border-slate-50 pb-2">
                        <span class="text-slate-500">PHP Version:</span>
                        <span class="font-mono text-indigo-600 font-bold"><?php echo $version; ?></span>
                    </div>
                    <div class="flex justify-between border-b border-slate-50 pb-2">
                        <span class="text-slate-500">SAPI:</span>
                        <span class="font-mono text-slate-700"><?php echo php_sapi_name(); ?></span>
                    </div>
                    <div class="flex justify-between">
                        <span class="text-slate-500">Memory:</span>
                        <span class="font-mono text-slate-700"><?php echo ini_get('memory_limit'); ?></span>
                    </div>
                </div>
            </section>
        </div>

        <section class="bg-white rounded-2xl shadow-sm p-6 border border-slate-200">
            <h2 class="text-lg font-semibold mb-4 text-slate-800">📝 PHP Shell Output</h2>
            <div class="bg-slate-900 rounded-xl p-4 font-mono text-xs text-green-400 leading-relaxed">
                <?php 
                    echo "> php --version\\n";
                    echo "PHP " . phpversion() . " (cli) (built: WASM)\\n\\n";
                    echo "> date('r')\\n";
                    echo date('r') . "\\n\\n";
                    echo "> echo PHP_OS\\n";
                    echo PHP_OS;
                ?>
            </div>
        </section>
    </div>
</div>
                `;

                // 3. Run the code
                const output = await php.run(phpCode);

                // 4. Render
                document.body.innerHTML = output.text;

            } catch (error) {
                console.error('PHP WASM Error:', error);
                document.getElementById('loading-screen').innerHTML = `
                    <div class="text-red-500 p-6 bg-white shadow-xl rounded-2xl border border-red-100 max-w-md mx-auto">
                        <h2 class="font-bold text-lg mb-2">Initialization Failed</h2>
                        <p class="text-sm text-slate-600 mb-4">The WebAssembly module could not be loaded. This is often due to browser security restrictions or network issues.</p>
                        <div class="bg-slate-50 p-3 rounded font-mono text-[10px] text-red-400 break-all">
                            ${error.stack || error.message}
                        </div>
                        <button onclick="location.reload()" class="mt-4 w-full bg-slate-800 text-white py-2 rounded-lg text-sm">Try Again</button>
                    </div>
                `;
            }
        }

        runPhp();
    </script>
</body>
</html>
</body>
</html>

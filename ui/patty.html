<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>St. Paddy's 3D Face Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Three.js Library for 3D Rendering -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <!-- MediaPipe Face Landmarker Library for AI Tracking -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #022c22;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        /* Hidden video element used as a data source for the AI model */
        #webcam-raw-video-source {
            position: absolute;
            left: -9999px;
            top: -9999px;
            visibility: hidden;
        }
        canvas {
            display: block;
        }
        .user-interface-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 2.5rem;
            z-index: 100;
        }
        .user-interaction-enabled {
            pointer-events: auto;
        }
    </style>
</head>
<body class="text-white">

    <video id="webcam-raw-video-source" autoplay playsinline></video>
    <canvas id="three-dimensional-rendering-surface"></canvas>

    <div class="user-interface-container">
        <!-- Top Title Branding -->
        <div class="bg-emerald-800/90 backdrop-blur-2xl border-4 border-yellow-500 p-6 rounded-3xl shadow-[0_0_70px_rgba(234,179,8,0.5)] user-interaction-enabled">
            <h1 class="text-4xl font-black text-yellow-400 text-center mb-1 tracking-tighter drop-shadow-xl">
                ☘️ LUCK O' THE 3D ☘️
            </h1>
            <p class="text-emerald-500 font-bold text-center text-xs uppercase tracking-[0.3em] bg-white/10 py-1 rounded-full">
                St. Patrick's Augmented Reality
            </p>
        </div>

        <!-- Centered Asset Loading Indicator -->
        <div id="application-startup-loading-screen" class="flex flex-col items-center transition-opacity duration-1000">
            <div class="relative w-28 h-28 mb-6">
                <div class="absolute inset-0 border-[10px] border-emerald-950 rounded-full"></div>
                <div class="absolute inset-0 border-[10px] border-t-yellow-500 rounded-full animate-spin"></div>
            </div>
            <p class="text-yellow-200 font-mono text-xl tracking-[0.4em] uppercase animate-pulse">
                Polishing Pot O' Gold...
            </p>
        </div>

        <!-- Bottom Mode Selection Interface -->
        <div class="bg-emerald-950/95 p-6 rounded-full border-2 border-emerald-500/30 flex gap-10 user-interaction-enabled shadow-2xl backdrop-blur-xl mb-4">
            <button id="mode-button-select-hat" class="flex flex-col items-center group transition-transform hover:scale-110 active:scale-90">
                <div class="w-16 h-16 bg-emerald-700 group-hover:bg-yellow-500 rounded-2xl flex items-center justify-center text-4xl shadow-lg transition-colors mb-2">🎩</div>
                <span class="text-xs font-black tracking-widest text-emerald-200 group-hover:text-yellow-400">HAT</span>
            </button>
            <button id="mode-button-select-clover" class="flex flex-col items-center group transition-transform hover:scale-110 active:scale-90">
                <div class="w-16 h-16 bg-emerald-700 group-hover:bg-yellow-500 rounded-2xl flex items-center justify-center text-4xl shadow-lg transition-colors mb-2">🍀</div>
                <span class="text-xs font-black tracking-widest text-emerald-200 group-hover:text-yellow-400">CLOVER</span>
            </button>
        </div>
    </div>

    <script type="module">
        import { FaceLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3";

        // --- Core Application Logic and State Variables ---
        let globalFaceLandmarkerInstance;
        let isWebcamDeviceStreaming = false;
        let lastProcessedVideoTimestamp = -1;
        
        const rawVideoSourceElement = document.getElementById("webcam-raw-video-source");
        const threeDimensionalMainCanvas = document.getElementById("three-dimensional-rendering-surface");
        const loadingIndicatorOverlay = document.getElementById("application-startup-loading-screen");
        
        let globalThreeDimensionalRenderer;
        let globalThreeDimensionalScene;
        let globalThreeDimensionalCamera;
        
        let leprechaunHatGroupContainer;
        let luckyCloverGroupContainer;
        let webcamFeedVideoTexture;
        let webcamBackgroundVideoMesh;
        
        let currentActiveAugmentationMode = 'hat'; 

        /**
         * Orchestrates the initialization and startup of the AR environment
         */
        async function runApplicationInitialization() {
            try {
                // Initialize the AI backend using MediaPipe
                const visionFilesetResolver = await FilesetResolver.forVisionTasks(
                    "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm"
                );
                
                globalFaceLandmarkerInstance = await FaceLandmarker.createFromOptions(visionFilesetResolver, {
                    baseOptions: {
                        modelAssetPath: `https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task`,
                        delegate: "GPU"
                    },
                    outputFaceBlendshapes: true,
                    runningMode: "VIDEO",
                    numFaces: 1
                });

                setupThreeDimensionalRenderingEngine();
                await connectToWebcamHardware();
                
                // Remove loading screen once assets are ready
                loadingIndicatorOverlay.classList.add('opacity-0');
                setTimeout(() => loadingIndicatorOverlay.remove(), 1000);
                
                requestAnimationFrame(executeMainApplicationLoop);
            } catch (initializationFailure) {
                console.error("The application encountered a fatal error during startup:", initializationFailure);
            }
        }

        /**
         * Prepares the Three.js scene, lighting, and 3D geometric objects
         */
        function setupThreeDimensionalRenderingEngine() {
            globalThreeDimensionalScene = new THREE.Scene();
            
            // Set up a standard perspective camera
            globalThreeDimensionalCamera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
            globalThreeDimensionalCamera.position.z = 10;
            
            globalThreeDimensionalRenderer = new THREE.WebGLRenderer({ 
                canvas: threeDimensionalMainCanvas, 
                antialias: true, 
                alpha: true 
            });
            globalThreeDimensionalRenderer.setSize(window.innerWidth, window.innerHeight);
            globalThreeDimensionalRenderer.setPixelRatio(window.devicePixelRatio);

            const environmentalAmbientLight = new THREE.AmbientLight(0xffffff, 0.85);
            globalThreeDimensionalScene.add(environmentalAmbientLight);
            
            const directionalKeyLight = new THREE.DirectionalLight(0xffffff, 0.65);
            directionalKeyLight.position.set(0, 5, 12);
            globalThreeDimensionalScene.add(directionalKeyLight);

            constructLeprechaunHat3DObject();
            constructLuckyClover3DObject();
            
            // Map the webcam feed to a background mesh
            webcamFeedVideoTexture = new THREE.VideoTexture(rawVideoSourceElement);
            webcamFeedVideoTexture.minFilter = THREE.LinearFilter;
            
            const backgroundPlaneGeometry = new THREE.PlaneGeometry(1, 1);
            const backgroundPlaneMaterial = new THREE.MeshBasicMaterial({ map: webcamFeedVideoTexture });
            webcamBackgroundVideoMesh = new THREE.Mesh(backgroundPlaneGeometry, backgroundPlaneMaterial);
            
            // Position the background far enough away to avoid overlap
            webcamBackgroundVideoMesh.position.z = -50; 
            globalThreeDimensionalScene.add(webcamBackgroundVideoMesh);

            window.addEventListener('resize', synchronizeViewportDimensions);
            synchronizeViewportDimensions();
        }

        function constructLeprechaunHat3DObject() {
            leprechaunHatGroupContainer = new THREE.Group();
            
            const emeraldGreenMaterial = new THREE.MeshStandardMaterial({ color: 0x065f46, roughness: 0.35 });
            const midnightBlackMaterial = new THREE.MeshStandardMaterial({ color: 0x111827 });
            const polishedGoldMaterial = new THREE.MeshStandardMaterial({ color: 0xfacc15, metalness: 0.85, roughness: 0.1 });

            // The Brim of the Hat
            const hatBrimGeometry = new THREE.CylinderGeometry(1.6, 1.6, 0.1, 64);
            const hatBrimMesh = new THREE.Mesh(hatBrimGeometry, emeraldGreenMaterial);
            leprechaunHatGroupContainer.add(hatBrimMesh);

            // The Tall Column of the Hat
            const hatBodyGeometry = new THREE.CylinderGeometry(1.0, 0.85, 1.6, 64);
            const hatBodyMesh = new THREE.Mesh(hatBodyGeometry, emeraldGreenMaterial);
            hatBodyMesh.position.y = 0.8;
            leprechaunHatGroupContainer.add(hatBodyMesh);

            // The Decorative Ribbon
            const hatRibbonGeometry = new THREE.CylinderGeometry(0.87, 0.87, 0.35, 64);
            const hatRibbonMesh = new THREE.Mesh(hatRibbonGeometry, midnightBlackMaterial);
            hatRibbonMesh.position.y = 0.25;
            leprechaunHatGroupContainer.add(hatRibbonMesh);

            // The Golden Buckle
            const hatBuckleGeometry = new THREE.BoxGeometry(0.45, 0.4, 0.2);
            const hatBuckleMesh = new THREE.Mesh(hatBuckleGeometry, polishedGoldMaterial);
            hatBuckleMesh.position.set(0, 0.25, 0.9);
            leprechaunHatGroupContainer.add(hatBuckleMesh);

            leprechaunHatGroupContainer.scale.set(0, 0, 0); 
            globalThreeDimensionalScene.add(leprechaunHatGroupContainer);
        }

        function constructLuckyClover3DObject() {
            luckyCloverGroupContainer = new THREE.Group();
            const cloverGreenMaterial = new THREE.MeshStandardMaterial({ color: 0x10b981, roughness: 0.45 });
            const cloverLeafGeometry = new THREE.SphereGeometry(0.45, 32, 32);
            cloverLeafGeometry.scale(1, 0.25, 1.35); 

            // Arrange 4 leaves around the center
            for(let petalIteration = 0; petalIteration < 4; petalIteration++) {
                const leafMesh = new THREE.Mesh(cloverLeafGeometry, cloverGreenMaterial);
                const rotationRadian = (petalIteration * Math.PI) / 2;
                leafMesh.position.set(Math.cos(rotationRadian) * 0.45, 0, Math.sin(rotationRadian) * 0.45);
                leafMesh.rotation.y = rotationRadian;
                luckyCloverGroupContainer.add(leafMesh);
            }

            // Create the stem
            const cloverStemGeometry = new THREE.CylinderGeometry(0.08, 0.08, 1.5);
            const cloverStemMesh = new THREE.Mesh(cloverStemGeometry, cloverGreenMaterial);
            cloverStemMesh.position.y = -0.7;
            cloverStemMesh.rotation.z = 0.25;
            luckyCloverGroupContainer.add(cloverStemMesh);

            luckyCloverGroupContainer.scale.set(0, 0, 0);
            globalThreeDimensionalScene.add(luckyCloverGroupContainer);
        }

        async function connectToWebcamHardware() {
            const captureConstraints = { 
                video: { 
                    width: { ideal: 1280 }, 
                    height: { ideal: 720 },
                    facingMode: "user"
                } 
            };
            
            const webcamCaptureStream = await navigator.mediaDevices.getUserMedia(captureConstraints);
            rawVideoSourceElement.srcObject = webcamCaptureStream;
            
            return new Promise((resolve) => {
                rawVideoSourceElement.onloadedmetadata = () => {
                    rawVideoSourceElement.play();
                    isWebcamDeviceStreaming = true;
                    resolve();
                };
            });
        }

        function synchronizeViewportDimensions() {
            const currentScreenWidth = window.innerWidth;
            const currentScreenHeight = window.innerHeight;
            
            globalThreeDimensionalCamera.aspect = currentScreenWidth / currentScreenHeight;
            globalThreeDimensionalCamera.updateProjectionMatrix();
            globalThreeDimensionalRenderer.setSize(currentScreenWidth, currentScreenHeight);

            // Re-scale background plane to match camera FOV and aspect ratio
            const verticalFrustumHeight = 2 * Math.tan((globalThreeDimensionalCamera.fov * Math.PI / 180) / 2) * Math.abs(webcamBackgroundVideoMesh.position.z);
            const standardVideoRatio = 16 / 9;
            let meshScaledWidth, meshScaledHeight;
            
            if (globalThreeDimensionalCamera.aspect > standardVideoRatio) {
                meshScaledWidth = verticalFrustumHeight * globalThreeDimensionalCamera.aspect;
                meshScaledHeight = meshScaledWidth / standardVideoRatio;
            } else {
                meshScaledHeight = verticalFrustumHeight;
                meshScaledWidth = verticalFrustumHeight * standardVideoRatio;
            }
            
            webcamBackgroundVideoMesh.scale.set(meshScaledWidth, meshScaledHeight, 1);
        }

        function executeMainApplicationLoop() {
            if (rawVideoSourceElement.currentTime !== lastProcessedVideoTimestamp) {
                lastProcessedVideoTimestamp = rawVideoSourceElement.currentTime;
                
                const frameProcessingResults = globalFaceLandmarkerInstance.detectForVideo(rawVideoSourceElement, performance.now());
                
                if (frameProcessingResults.faceLandmarks && frameProcessingResults.faceLandmarks.length > 0) {
                    processFaceTrackingFrame(frameProcessingResults.faceLandmarks[0]);
                } else {
                    // Retract assets smoothly if face is lost
                    leprechaunHatGroupContainer.scale.lerp(new THREE.Vector3(0, 0, 0), 0.15);
                    luckyCloverGroupContainer.scale.lerp(new THREE.Vector3(0, 0, 0), 0.15);
                }
            }

            if (currentActiveAugmentationMode === 'clover') {
                luckyCloverGroupContainer.rotation.y += 0.04;
            }

            globalThreeDimensionalRenderer.render(globalThreeDimensionalScene, globalThreeDimensionalCamera);
            requestAnimationFrame(executeMainApplicationLoop);
        }

        /**
         * Transforms raw AI landmark data into 3D space with accurate head-top alignment
         */
        function processFaceTrackingFrame(faceLandmarkPoints) {
            // High-Value Landmarks:
            // 10: Top center of the forehead (Hairline)
            // 1: Center tip of the nose
            // 33: Outer corner of the left eye
            // 263: Outer corner of the right eye
            const noseTipLandmark = faceLandmarkPoints[1];
            const foreheadTopLandmark = faceLandmarkPoints[10];
            const leftEyeOuterLandmark = faceLandmarkPoints[33];
            const rightEyeOuterLandmark = faceLandmarkPoints[263];

            // 1. Calculate world-space dimensions for mapping
            const activeDepthPlane = 5; 
            const cameraDepthDistance = Math.abs(globalThreeDimensionalCamera.position.z - activeDepthPlane);
            const visibleVerticalSpan = 2 * Math.tan((globalThreeDimensionalCamera.fov * Math.PI / 180) / 2) * cameraDepthDistance;
            const visibleHorizontalSpan = visibleVerticalSpan * globalThreeDimensionalCamera.aspect;

            // 2. Map coordinates with Mirror Correction:
            // (landmarks.x - 0.5) ensures movement follows standard mirrored webcam expectations
            const headHorizontalWorldPosition = (foreheadTopLandmark.x - 0.5) * visibleHorizontalSpan;
            const headVerticalWorldPosition = (0.5 - foreheadTopLandmark.y) * visibleVerticalSpan;

            // 3. Dynamic Scaling based on proximity to camera
            const interocularDistanceInPixels = Math.sqrt(
                Math.pow(rightEyeOuterLandmark.x - leftEyeOuterLandmark.x, 2) + 
                Math.pow(rightEyeOuterLandmark.y - leftEyeOuterLandmark.y, 2)
            );
            
            const calculatedAccessoryScale = interocularDistanceInPixels * (visibleHorizontalSpan * 0.95);

            // 4. Orientation Calculation (Roll and Yaw)
            const headRollRadian = Math.atan2(rightEyeOuterLandmark.y - leftEyeOuterLandmark.y, rightEyeOuterLandmark.x - leftEyeOuterLandmark.x);
            const headYawApproximation = (noseTipLandmark.x - (leftEyeOuterLandmark.x + rightEyeOuterLandmark.x) / 2) * 2;

            // 5. Asset Application logic
            if (currentActiveAugmentationMode === 'hat') {
                // Place the hat slightly above the forehead landmark for a natural fit
                const hatPlacementY = headVerticalWorldPosition + (calculatedAccessoryScale * 0.1);
                leprechaunHatGroupContainer.position.lerp(new THREE.Vector3(headHorizontalWorldPosition, hatPlacementY, activeDepthPlane), 0.45);
                leprechaunHatGroupContainer.rotation.set(0.15, headYawApproximation, -headRollRadian);
                leprechaunHatGroupContainer.scale.lerp(new THREE.Vector3(calculatedAccessoryScale, calculatedAccessoryScale, calculatedAccessoryScale), 0.25);
                
                luckyCloverGroupContainer.scale.set(0, 0, 0);
            } else {
                // MOVE CLOVER SIGNIFICANTLY UP: Anchored so that the bottom of the stem sits at the hairline.
                // Adjusted multiplier to 1.45 to ensure the clover's bottom is aligned with the top of the head.
                const cloverPlacementY = headVerticalWorldPosition + (calculatedAccessoryScale * 1.45);
                luckyCloverGroupContainer.position.lerp(new THREE.Vector3(headHorizontalWorldPosition, cloverPlacementY, activeDepthPlane), 0.45);
                luckyCloverGroupContainer.rotation.set(0, headYawApproximation, -headRollRadian);
                luckyCloverGroupContainer.scale.lerp(new THREE.Vector3(calculatedAccessoryScale * 0.9, calculatedAccessoryScale * 0.9, calculatedAccessoryScale * 0.9), 0.25);
                
                leprechaunHatGroupContainer.scale.set(0, 0, 0);
            }
        }

        // --- Event Listener Assignments ---
        document.getElementById('mode-button-select-hat').addEventListener('click', () => {
            currentActiveAugmentationMode = 'hat';
        });
        
        document.getElementById('mode-button-select-clover').addEventListener('click', () => {
            currentActiveAugmentationMode = 'clover';
        });

        // Initialize on page load
        window.addEventListener('load', runApplicationInitialization);
    </script>
</body>
</html>

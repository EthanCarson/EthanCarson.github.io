
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Identity Management Portal</title>
    <!-- Tailwind CSS for modern, responsive styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts for professional typography -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #f1f5f9;
        }
        .identity-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .identity-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }
        .shimmer-animation {
            background: linear-gradient(90deg, #e2e8f0 25%, #cbd5e1 50%, #e2e8f0 75%);
            background-size: 200% 100%;
            animation: shimmerEffect 2s infinite linear;
        }
        @keyframes shimmerEffect {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
    </style>
</head>
<body class="min-h-screen">

    <!-- Global Error Toast (Hidden by default) -->
    <div id="criticalErrorContainer" class="fixed bottom-6 right-6 z-[100] hidden">
        <div class="bg-red-600 text-white px-6 py-4 rounded-2xl shadow-2xl flex items-center gap-4">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
            <div>
                <p class="font-bold text-sm">System Exception Detected</p>
                <p id="criticalErrorMessage" class="text-xs opacity-90">Check console for full trace.</p>
            </div>
        </div>
    </div>

    <!-- Main Navigation Bar -->
    <nav class="bg-white border-b border-slate-200 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-20">
                <div class="flex items-center space-x-4">
                    <div class="bg-indigo-600 p-2.5 rounded-xl shadow-lg shadow-indigo-200">
                        <svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path>
                        </svg>
                    </div>
                    <div>
                        <h1 class="text-xl font-extrabold text-slate-900 tracking-tight">VibeID Portal</h1>
                        <p class="text-xs font-medium text-slate-500 uppercase tracking-widest">Employee Directory</p>
                    </div>
                </div>
                <div class="flex items-center gap-4">
                    <div id="dataBadge" class="hidden sm:flex items-center px-4 py-2 bg-slate-50 rounded-full border border-slate-100">
                        <span id="recordCount" class="text-sm font-bold text-slate-700">0</span>
                        <span class="mx-2 text-slate-300">|</span>
                        <span class="text-xs font-semibold text-slate-500 uppercase">Records Loaded</span>
                    </div>
                    <button id="fetchDataButton" class="bg-slate-900 hover:bg-slate-800 text-white px-5 py-2.5 rounded-xl font-semibold transition-all flex items-center gap-2 active:scale-95 disabled:opacity-50 disabled:cursor-not-allowed">
                        <svg id="buttonIcon" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path>
                        </svg>
                        <span id="buttonText">Sync Data</span>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10">
        
        <!-- Interactive Feedback Section -->
        <div id="applicationFeedback" class="hidden mb-8 p-5 rounded-2xl border flex items-center gap-4 animate-in fade-in duration-500">
            <div id="feedbackIconContainer" class="p-2 rounded-full"></div>
            <div>
                <h4 id="feedbackTitle" class="font-bold"></h4>
                <p id="feedbackDescription" class="text-sm opacity-90"></p>
            </div>
        </div>

        <!-- ID Card Grid -->
        <div id="cardDisplayGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8">
            <!-- Loading Skeletons - visible during initial load -->
            <div id="initialLoadingPlaceholder" class="bg-white rounded-3xl p-8 border border-slate-100">
                <div class="w-24 h-24 rounded-2xl shimmer-animation mx-auto mb-6"></div>
                <div class="h-6 w-3/4 shimmer-animation mx-auto mb-3 rounded-lg"></div>
                <div class="h-4 w-1/2 shimmer-animation mx-auto mb-8 rounded-lg"></div>
                <div class="space-y-4 pt-6 border-t border-slate-50">
                    <div class="h-3 w-full shimmer-animation rounded"></div>
                    <div class="h-3 w-full shimmer-animation rounded"></div>
                </div>
            </div>
        </div>
    </main>

    <script>
        /**
         * The IdentityCardApplication manages state and rendering for employee identification cards.
         */
        
        const applicationState = {
            dataSourceUrl: "https://script.google.com/macros/s/AKfycbyiwTWDa3r7g9Xb84rUKAXoWTI1UiC-oq-qWezhTPzkORGk3RqdZ2F0bavc2sdz1LSFsA/exec",
            identities: [],
            isFetchingData: false
        };

        const domElements = {
            gridContainer: document.getElementById('cardDisplayGrid'),
            syncButton: document.getElementById('fetchDataButton'),
            buttonText: document.getElementById('buttonText'),
            buttonIcon: document.getElementById('buttonIcon'),
            recordCounter: document.getElementById('recordCount'),
            dataBadge: document.getElementById('dataBadge'),
            feedbackBox: document.getElementById('applicationFeedback'),
            feedbackTitle: document.getElementById('feedbackTitle'),
            feedbackDescription: document.getElementById('feedbackDescription'),
            feedbackIcon: document.getElementById('feedbackIconContainer'),
            criticalErrorBox: document.getElementById('criticalErrorContainer'),
            criticalErrorMessage: document.getElementById('criticalErrorMessage')
        };

        // Global Error Listener to catch "Something Else"
        window.onerror = function(message, source, lineno, colno, error) {
            console.error("GLOBAL EXCEPTION CAPTURED:", { message, source, lineno, colno, error });
            domElements.criticalErrorBox.classList.remove('hidden');
            domElements.criticalErrorMessage.textContent = message;
            return false;
        };

        function displayApplicationFeedback(title, description, type) {
            domElements.feedbackBox.classList.remove('hidden', 'bg-red-50', 'border-red-100', 'text-red-800', 'bg-green-50', 'border-green-100', 'text-green-800', 'bg-blue-50', 'border-blue-100', 'text-blue-800');
            
            if (type === 'error') {
                domElements.feedbackBox.classList.add('bg-red-50', 'border-red-100', 'text-red-800');
                domElements.feedbackIcon.innerHTML = `<svg class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd"></path></svg>`;
            } else if (type === 'success') {
                domElements.feedbackBox.classList.add('bg-green-50', 'border-green-100', 'text-green-800');
                domElements.feedbackIcon.innerHTML = `<svg class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"></path></svg>`;
            }

            domElements.feedbackTitle.textContent = title;
            domElements.feedbackDescription.textContent = description;
        }

        function generateAvatarStyle(seedName) {
            const backgroundColors = ['from-indigo-500 to-blue-600', 'from-purple-500 to-pink-600', 'from-emerald-500 to-teal-600', 'from-amber-500 to-orange-600', 'from-rose-500 to-red-600', 'from-cyan-500 to-blue-600'];
            let characterSum = 0;
            for (let index = 0; index < seedName.length; index++) characterSum += seedName.charCodeAt(index);
            return backgroundColors[characterSum % backgroundColors.length];
        }

        function getInitials(fullName) {
            const nameParts = fullName.trim().split(/\s+/);
            if (nameParts.length >= 2) return (nameParts[0][0] + nameParts[nameParts.length - 1][0]).toUpperCase();
            return (nameParts[0][0] || '?').toUpperCase();
        }

        function createIdentityCardHtml(individual) {
            const avatarGradient = generateAvatarStyle(individual.fullName || "User");
            const initials = getInitials(individual.fullName || "U");
            return `
                <div class="identity-card bg-white rounded-3xl border border-slate-100 overflow-hidden flex flex-col group h-full shadow-sm">
                    <div class="h-32 bg-slate-50 relative flex justify-center items-end pb-0 overflow-visible">
                        <div class="absolute top-4 right-4 bg-white/80 backdrop-blur-md px-3 py-1 rounded-full border border-white/50 shadow-sm">
                            <span class="text-[10px] font-black text-slate-400 tracking-tighter uppercase">ID: ${individual.id}</span>
                        </div>
                        <div class="translate-y-1/2 w-24 h-24 rounded-3xl bg-gradient-to-br ${avatarGradient} flex items-center justify-center text-white text-3xl font-bold shadow-xl shadow-indigo-100 ring-8 ring-white">
                            ${initials}
                        </div>
                    </div>
                    <div class="px-8 pt-16 pb-8 text-center flex-grow flex flex-col">
                        <h3 class="text-xl font-bold text-slate-900 mb-1 group-hover:text-indigo-600 transition-colors">${individual.fullName || "Unnamed Record"}</h3>
                        <p class="text-indigo-600 font-semibold text-sm mb-6">${individual.jobTitle || "No Title"}</p>
                        <div class="space-y-4 text-left border-t border-slate-50 pt-6 mt-auto">
                            <div class="flex items-center gap-3"><div class="p-2 bg-slate-50 rounded-lg text-slate-400"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"></path></svg></div><span class="text-xs font-medium text-slate-600 truncate">${individual.company || "N/A"}</span></div>
                            <div class="flex items-center gap-3"><div class="p-2 bg-slate-50 rounded-lg text-slate-400"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg></div><span class="text-xs font-medium text-slate-600 truncate">${individual.email || "N/A"}</span></div>
                            <div class="flex items-center gap-3"><div class="p-2 bg-slate-50 rounded-lg text-slate-400"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path></svg></div><span class="text-xs font-medium text-slate-600 truncate">${individual.location || "N/A"}</span></div>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderIdentityGrid(identitiesArray) {
            console.group("Render Logic");
            console.log(`Rendering ${identitiesArray.length} items to grid.`);
            domElements.gridContainer.innerHTML = '';
            
            if (identitiesArray.length === 0) {
                domElements.gridContainer.innerHTML = `
                    <div class="col-span-full py-24 text-center">
                        <h2 class="text-2xl font-bold text-slate-800 mb-2">Empty Records</h2>
                        <p class="text-slate-500">The server returned successfully but with zero rows.</p>
                    </div>
                `;
            } else {
                identitiesArray.forEach(individual => {
                    const cardWrapper = document.createElement('div');
                    cardWrapper.innerHTML = createIdentityCardHtml(individual);
                    domElements.gridContainer.appendChild(cardWrapper.firstElementChild);
                });
                domElements.recordCounter.textContent = identitiesArray.length;
                domElements.dataBadge.classList.remove('hidden');
            }
            console.groupEnd();
        }

        async function fetchIdentitiesFromEndpoint() {
            if (applicationState.isFetchingData) return;

            console.group("Sync Lifecycle");
            console.log("Stage 1: Updating UI to Loading State");
            
            applicationState.isFetchingData = true;
            domElements.syncButton.disabled = true;
            domElements.buttonText.textContent = "Connecting...";
            domElements.buttonIcon.classList.add('animate-spin');
            
            try {
                console.log(`Stage 2: Fetching from ${applicationState.dataSourceUrl}`);
                
                // Explicitly handling redirects which is common with Google Apps Scripts
                const networkResponse = await fetch(applicationState.dataSourceUrl, {
                    method: 'GET',
                    redirect: 'follow',
                    headers: { 'Accept': 'application/json' }
                });
                
                console.log(`Stage 3: Response Code ${networkResponse.status}`);
                
                if (!networkResponse.ok) throw new Error(`HTTP ${networkResponse.status}: ${networkResponse.statusText}`);
                
                console.log("Stage 4: Parsing JSON Content");
                const rawJsonContent = await networkResponse.json();
                
                console.log("Stage 5: Data Structural Validation");
                const finalIdentities = Array.isArray(rawJsonContent) ? rawJsonContent : (rawJsonContent.data || []);
                
                applicationState.identities = finalIdentities;
                renderIdentityGrid(applicationState.identities);
                
                displayApplicationFeedback("Success", `Loaded ${finalIdentities.length} records.`, "success");
                console.log("Stage 6: Process Complete");
            } catch (networkError) {
                console.error("CRITICAL SYNC FAILURE:", networkError);
                displayApplicationFeedback("Connection Failed", networkError.message, "error");
            } finally {
                applicationState.isFetchingData = false;
                domElements.syncButton.disabled = false;
                domElements.buttonText.textContent = "Sync Data";
                domElements.buttonIcon.classList.remove('animate-spin');
                console.groupEnd();
            }
        }

        // AUTO-INIT on load
        window.addEventListener('DOMContentLoaded', () => {
            console.log("Portal Initialized. Triggering automatic data sync...");
            fetchIdentitiesFromEndpoint();
        });

        domElements.syncButton.addEventListener('click', fetchIdentitiesFromEndpoint);
    </script>
</body>
</html>

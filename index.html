<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ethan Carson Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
      body {
        margin: 0;
        overflow: hidden;
        background-color: #0f172a;
        font-family: "Inter", sans-serif;
      }
      #canvas-container {
        position: absolute;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        z-index: 0;
      }
      #ui-layer {
        position: absolute;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        z-index: 10;
        pointer-events: none;
        overflow-y: auto;
      }
      .interactive {
        pointer-events: auto;
      }

      /* Glassmorphism utilities */
      .glass {
        background: rgba(15, 23, 42, 0.6);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.1);
      }

      /* Custom Scrollbar */
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: rgba(0, 0, 0, 0.2);
      }
      ::-webkit-scrollbar-thumb {
        background: rgba(99, 102, 241, 0.5);
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: rgba(99, 102, 241, 0.8);
      }
    </style>
  </head>
  <body class="text-slate-200">
    <!-- 3D Scene Container -->
    <div id="canvas-container"></div>

    <!-- UI Overlay -->
    <div id="ui-layer" class="flex flex-col md:flex-row p-4 md:p-8 gap-8">
      <!-- Left Column: Info & Skills -->
      <div class="interactive flex-1 max-w-2xl flex flex-col gap-6">
        <header class="glass rounded-2xl p-8 shadow-2xl">
          <div
            class="inline-block px-3 py-1 mb-4 rounded-full bg-indigo-500/20 text-indigo-300 border border-indigo-500/30 text-sm font-semibold tracking-wider uppercase">
            Hello World!
          </div>
          <h1
            class="text-4xl md:text-5xl font-bold text-white mb-2 tracking-tight">
            Ethan Carson
          </h1>
          <h2 class="text-xl md:text-2xl text-indigo-400 mb-6 font-light">
            Pursuing A.A.S. in Web and Mobile Development
          </h2>
          <p class="text-slate-400 leading-relaxed">
            Building the future of the web, one pixel at a time. This is a
            temporary portfolio while my full interactive experience is
            compiling.
          </p>
        </header>

        <div class="glass rounded-2xl p-8 shadow-2xl">
          <h3
            class="text-2xl font-bold text-white mb-6 border-b border-slate-700 pb-2">
            Technical Arsenal
          </h3>
          <div class="flex flex-wrap gap-3">
            <!-- Skills will be injected here -->
            <div id="skills-container" class="contents"></div>
          </div>
        </div>

        <div class="glass rounded-2xl p-8 shadow-2xl">
          <h3
            class="text-2xl font-bold text-white mb-6 border-b border-slate-700 pb-2">
            What I Do
          </h3>
          <ul
            id="services-container"
            class="grid grid-cols-1 sm:grid-cols-2 gap-4 text-slate-300">
            <!-- Services will be injected here -->
          </ul>
        </div>
      </div>

      <!-- Right Column: Navigation / Data Structure -->
      <div class="interactive w-full md:w-96 flex flex-col gap-6">
        <div class="glass rounded-2xl p-8 shadow-2xl h-fit">
          <h3 class="text-2xl font-bold text-white mb-2">Directory</h3>
          <p class="text-sm text-slate-400 mb-6">
            Explore my project pathways.
          </p>

          <div id="directory-container" class="space-y-4">
            <!-- Directory structure will be injected here -->
          </div>
        </div>
      </div>
    </div>

    <!-- Message Box for URL clicks -->
    <div
      id="message-box"
      class="fixed bottom-4 right-4 glass rounded-xl p-4 shadow-2xl transform translate-y-24 opacity-0 transition-all duration-300 z-50 pointer-events-none flex items-center gap-3 border-l-4 border-l-indigo-500">
      <svg
        class="w-6 h-6 text-indigo-400"
        fill="none"
        stroke="currentColor"
        viewBox="0 0 24 24">
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
      </svg>
      <div id="message-text" class="text-sm font-medium text-white">
        Navigating...
      </div>
    </div>

    <script>
      // ==========================================
      // CONFIGURATION DATA
      // ==========================================

      const siteData = {
        skills: [
          "HTML",
          "JS",
          "CSS",
          "React",
          "Solid",
          "Next",
          "Tailwind",
          "Bootstrap",
          "SASS",
          "Figma",
          "and more...",
        ],
        services: [
          { title: "Websites", icon: "🌐" },
          { title: "Designs", icon: "✨" },
          { title: "Logos", icon: "🎨" },
          { title: "Social Media Creation", icon: "📱" },
          { title: "Pixel Art", icon: "👾" },
          { title: "Audio Editing", icon: "🎧" },
          { title: "Video Editing & Post", icon: "🎬" },
        ],
        navigationTree: [
          {
            categoryName: "Configuration",
            pathSegment: "config",
            selections: [{ name: "Manage Local Storage", slug: "index" }],
          },
          {
            categoryName: "UI Designs",
            pathSegment: "ui",
            selections: [
              { name: "Card Layout", slug: "index" },
              { name: "Flashcards", slug: "flashcards" },
              { name: "To-Do List", slug: "todolist" },
              { name: "Google Sheet Cards", slug: "sheet_cards" },
              { name: "MediaPipe Face Tracker", slug: "patty" },
            ],
          },
          {
            categoryName: "School Programs",
            pathSegment: "school_things",
            selections: [{ name: "Review", slug: "index" }],
          },
          {
            categoryName: "Timers",
            pathSegment: "timers",
            selections: [
              { name: "20-20-20 Timer", slug: "20-20-20" },
              { name: "Pomodoro Timer", slug: "pomodoro" },
            ],
          },
          {
            categoryName: "Games!",
            pathSegment: "games",
            selections: [
              { name: "Draw A Perfect Circle", slug: "index" },
              { name: "Body-Tracking Ninja Dojo!", slug: "dojo" },
            ],
          },
        ],
        baseUrl: "https://ethancarson.github.io",
      };

      // ==========================================
      // UI GENERATION LOGIC
      // ==========================================

      function initializeUI() {
        // Render Skills
        const skillsContainer = document.getElementById("skills-container");
        siteData.skills.forEach((skill) => {
          const el = document.createElement("span");
          el.className =
            "px-4 py-2 bg-slate-800/80 hover:bg-indigo-600/40 border border-slate-700 hover:border-indigo-400 rounded-lg text-sm transition-colors duration-200 cursor-default";
          el.innerText = skill;
          skillsContainer.appendChild(el);
        });

        // Render Services
        const servicesContainer = document.getElementById("services-container");
        siteData.services.forEach((service) => {
          const li = document.createElement("li");
          li.className =
            "flex items-center gap-3 p-2 hover:bg-white/5 rounded-lg transition-colors";
          li.innerHTML = `<span class="text-xl">${service.icon}</span> <span>${service.title}</span>`;
          servicesContainer.appendChild(li);
        });

        // Render Navigation Tree
        const dirContainer = document.getElementById("directory-container");
        siteData.navigationTree.forEach((category) => {
          const folderDiv = document.createElement("div");
          folderDiv.className =
            "bg-slate-900/50 rounded-lg border border-slate-800 overflow-hidden";

          const folderHeader = document.createElement("div");
          folderHeader.className =
            "px-4 py-3 bg-slate-800/50 text-indigo-300 font-semibold flex items-center gap-2";
          folderHeader.innerHTML = `<svg class="w-5 h-5 text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"></path></svg> /${category.pathSegment}`;
          folderDiv.appendChild(folderHeader);

          const list = document.createElement("ul");
          list.className = "p-2 space-y-1";
          category.selections.forEach((item) => {
            const li = document.createElement("li");
            const btn = document.createElement("button");
            btn.className =
              "w-full text-left px-3 py-2 text-sm text-slate-300 hover:text-white hover:bg-indigo-500/20 rounded-md transition-all flex items-center gap-2 group";
            btn.innerHTML = `<span class="text-slate-600 group-hover:text-indigo-400 transition-colors">↳</span> ${item.name}`;

            btn.onclick = () => {
              const generatedUrlPath = `/${category.pathSegment}/${item.slug}`;
              const fullUrl = `${siteData.baseUrl}${generatedUrlPath}`;
              handleNavigation(fullUrl);
            };

            li.appendChild(btn);
            list.appendChild(li);
          });

          folderDiv.appendChild(list);
          dirContainer.appendChild(folderDiv);
        });
      }

      function handleNavigation(fullUrl) {
        const msgBox = document.getElementById("message-box");
        const msgText = document.getElementById("message-text");

        msgText.innerHTML = `Navigating to: <br/><span class="text-indigo-300 font-mono text-xs">${fullUrl}</span>`;
        msgBox.classList.remove("translate-y-24", "opacity-0");

        // Small delay to let the user see the path before actually navigating
        setTimeout(() => {
          window.location.href = fullUrl;
        }, 1000);
      }

      // ==========================================
      // THREE.JS 3D SCENE
      // ==========================================

      let scene, camera, renderer, avatarGroup, particlesMesh;
      let mouseX = 0;
      let mouseY = 0;

      function initThreeJS() {
        const container = document.getElementById("canvas-container");
        scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x0f172a, 0.04);
        camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 2, 8);
        renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(renderer.domElement);

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);
        const p1 = new THREE.PointLight(0x6366f1, 2, 50);
        p1.position.set(5, 5, 5);
        scene.add(p1);
        const p2 = new THREE.PointLight(0xec4899, 1.5, 50);
        p2.position.set(-5, 3, -5);
        scene.add(p2);

        createAvatar();
        createEnvironment();

        window.addEventListener("resize", onWindowResize);
        document.addEventListener("mousemove", (e) => {
          mouseX = (e.clientX / window.innerWidth) * 2 - 1;
          mouseY = -(e.clientY / window.innerHeight) * 2 + 1;
        });
        animate();
      }

      function createAvatar() {
        avatarGroup = new THREE.Group();
        const skinMat = new THREE.MeshStandardMaterial({ color: 0xffceb4 });
        const shirtMat = new THREE.MeshStandardMaterial({ color: 0x1e293b });
        const laptopMat = new THREE.MeshStandardMaterial({ color: 0x94a3b8, metalness: 0.8 });
        const blondeMat = new THREE.MeshStandardMaterial({ color: 0xeebf6d });

        const head = new THREE.Mesh(new THREE.BoxGeometry(1.2, 1.2, 1.2), skinMat);
        head.position.y = 3.5;
        const hair = new THREE.Mesh(new THREE.BoxGeometry(1.3, 0.35, 1.3), blondeMat);
        hair.position.y = 4.15;
        const beard = new THREE.Mesh(new THREE.BoxGeometry(1.25, 0.35, 0.4), blondeMat);
        beard.position.set(0, 2.95, 0.45);
        const torso = new THREE.Mesh(new THREE.BoxGeometry(1.8, 2.2, 1), shirtMat);
        torso.position.y = 1.8;
        const laptop = new THREE.Mesh(new THREE.BoxGeometry(2, 0.1, 1.5), laptopMat);
        laptop.position.set(0, 0.8, 1.5);
        const platform = new THREE.Mesh(new THREE.CylinderGeometry(3, 3, 0.2, 32), new THREE.MeshStandardMaterial({ color: 0x1e1b4b }));

        avatarGroup.add(head, hair, beard, torso, laptop, platform);
        avatarGroup.position.set(3, -1, 0);
        avatarGroup.rotation.y = -Math.PI / 6;
        scene.add(avatarGroup);
      }

      function createEnvironment() {
        const grid = new THREE.GridHelper(60, 60, 0x6366f1, 0x1e293b);
        grid.position.y = -1;
        scene.add(grid);

        const particlesGeo = new THREE.BufferGeometry();
        const posArray = new Float32Array(600 * 3);
        for (let i = 0; i < 1800; i++) posArray[i] = (Math.random() - 0.5) * 30;
        particlesGeo.setAttribute("position", new THREE.BufferAttribute(posArray, 3));
        particlesMesh = new THREE.Points(particlesGeo, new THREE.PointsMaterial({ size: 0.05, color: 0x818cf8 }));
        scene.add(particlesMesh);
      }

      function onWindowResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
        avatarGroup.position.set(window.innerWidth < 768 ? 0 : 3, window.innerWidth < 768 ? -2 : -1, window.innerWidth < 768 ? -2 : 0);
      }

      const clock = new THREE.Clock();
      function animate() {
        requestAnimationFrame(animate);
        const t = clock.getElapsedTime();
        if (avatarGroup) {
          avatarGroup.position.y += Math.sin(t * 2) * 0.005;
          avatarGroup.rotation.x += (mouseY * 0.1 - avatarGroup.rotation.x) * 0.05;
          avatarGroup.rotation.y += ((window.innerWidth < 768 ? 0 : -Math.PI / 6) + mouseX * 0.2 - avatarGroup.rotation.y) * 0.05;
        }
        if (particlesMesh) particlesMesh.rotation.y = t * 0.05;
        renderer.render(scene, camera);
      }

      window.onload = () => {
        initializeUI();
        initThreeJS();
        onWindowResize();
      };
    </script>
  </body>
</html>

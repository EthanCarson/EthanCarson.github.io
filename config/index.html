<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LocalStorage Data Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --bg-primary: #f8fafc;
            --card-bg: #ffffff;
        }
        body {
            background-color: var(--bg-primary);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }
        .data-table-container {
            overflow-x: auto;
            border-radius: 0.75rem;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }
        .ai-summary-badge {
            background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
        }
        pre {
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        .loading-spinner {
            border: 3px solid rgba(0, 0, 0, 0.1);
            border-left-color: #6366f1;
            border-radius: 50%;
            width: 1.5rem;
            height: 1.5rem;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-6xl mx-auto">
        <!-- Header -->
        <header class="mb-8 flex flex-col md:flex-row md:items-center justify-between gap-4">
            <div>
                <h1 class="text-3xl font-bold text-slate-900">Storage Explorer</h1>
                <p class="text-slate-500">Manage and analyze local data for Project ID 0 & 1</p>
            </div>
            <div class="flex gap-2">
                <button onclick="refreshData()" class="px-4 py-2 bg-white border border-slate-200 rounded-lg hover:bg-slate-50 transition font-medium flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M3 21v-5h5"/></svg>
                    Refresh
                </button>
                <button onclick="clearAllProjectData()" class="px-4 py-2 bg-red-50 text-red-600 border border-red-100 rounded-lg hover:bg-red-100 transition font-medium">
                    Clear All
                </button>
            </div>
        </header>

        <!-- Stats Overview -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
            <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-100">
                <div class="text-slate-500 text-sm font-medium">Circle Game (ID 0)</div>
                <div id="stats-id0" class="text-2xl font-bold text-indigo-600">0 Items</div>
            </div>
            <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-100">
                <div class="text-slate-500 text-sm font-medium">Todo List (ID 1)</div>
                <div id="stats-id1" class="text-2xl font-bold text-purple-600">0 Items</div>
            </div>
            <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-100">
                <div class="text-slate-500 text-sm font-medium">Other Data</div>
                <div id="stats-other" class="text-2xl font-bold text-slate-400">0 Items</div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
            <div class="p-4 border-b border-slate-100 bg-slate-50/50 flex justify-between items-center">
                <h2 class="font-semibold text-slate-700 uppercase tracking-wider text-sm">Stored Elements</h2>
                <div class="text-xs text-slate-400">Total Size: <span id="total-size">0</span> KB</div>
            </div>
            
            <div class="data-table-container">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-slate-50 text-slate-600 text-sm uppercase">
                            <th class="p-4 border-b font-semibold">Key</th>
                            <th class="p-4 border-b font-semibold">Project</th>
                            <th class="p-4 border-b font-semibold">Raw Data</th>
                            <th class="p-4 border-b font-semibold">AI Summary</th>
                            <th class="p-4 border-b font-semibold">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="data-body">
                        <!-- Rows injected here -->
                    </tbody>
                </table>
            </div>
            
            <div id="empty-state" class="hidden py-12 text-center">
                <div class="text-slate-300 mb-2">
                    <svg class="mx-auto" xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"><path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"/><path d="m3.3 7 8.7 5 8.7-5"/><path d="M12 22V12"/></svg>
                </div>
                <p class="text-slate-500">No matching local storage data found.</p>
            </div>
        </div>
    </div>

    <!-- Edit Modal -->
    <div id="edit-modal" class="fixed inset-0 bg-slate-900/50 hidden items-center justify-center p-4 z-50">
        <div class="bg-white rounded-xl shadow-xl max-w-lg w-full overflow-hidden">
            <div class="p-6 border-b border-slate-100">
                <h3 class="text-xl font-bold text-slate-800" id="modal-title">Edit Storage Key</h3>
            </div>
            <div class="p-6">
                <label class="block text-sm font-medium text-slate-700 mb-2">JSON Value</label>
                <textarea id="modal-content" class="w-full h-48 p-3 border border-slate-200 rounded-lg font-mono text-sm focus:ring-2 focus:ring-indigo-500 outline-none"></textarea>
                <p id="modal-error" class="text-red-500 text-xs mt-2 hidden">Invalid JSON format</p>
            </div>
            <div class="p-6 bg-slate-50 flex justify-end gap-3">
                <button onclick="closeModal()" class="px-4 py-2 text-slate-600 font-medium">Cancel</button>
                <button id="save-button" class="px-6 py-2 bg-indigo-600 text-white rounded-lg font-medium hover:bg-indigo-700 transition">Save Changes</button>
            </div>
        </div>
    </div>

    <script>
        const apiKey = ""; // Provided at runtime
        const PROJECTS = {
            "0": { name: "Circle Game", color: "bg-indigo-100 text-indigo-700" },
            "1": { name: "Todo List", color: "bg-purple-100 text-purple-700" },
            "unknown": { name: "External/Other", color: "bg-slate-100 text-slate-600" }
        };

        let currentEditingKey = null;

        /**
         * AI Summary Logic with Exponential Backoff
         */
        async function getAISummary(dataString, key) {
            const systemPrompt = "You are a data analysis assistant. Briefly (1-2 sentences) explain what this JSON data represents. Mention specific items like circle counts or todo task titles if present.";
            const userQuery = `Key: ${key}\nData: ${dataString}`;

            const fetchWithRetry = async (retries = 0) => {
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: userQuery }] }],
                            systemInstruction: { parts: [{ text: systemPrompt }] }
                        })
                    });

                    if (!response.ok) throw new Error('API Error');
                    const result = await response.json();
                    return result.candidates?.[0]?.content?.parts?.[0]?.text || "No summary available.";
                } catch (error) {
                    if (retries < 5) {
                        const delay = Math.pow(2, retries) * 1000;
                        await new Promise(res => setTimeout(res, delay));
                        return fetchWithRetry(retries + 1);
                    }
                    return "AI analysis failed after multiple attempts.";
                }
            };

            return await fetchWithRetry();
        }

        /**
         * Core Logic
         */
        function refreshData() {
            const tableBody = document.getElementById('data-body');
            const emptyState = document.getElementById('empty-state');
            tableBody.innerHTML = '';
            
            let id0Count = 0;
            let id1Count = 0;
            let otherCount = 0;
            let totalBytes = 0;

            const keys = Object.keys(localStorage);
            
            if (keys.length === 0) {
                emptyState.classList.remove('hidden');
            } else {
                emptyState.classList.add('hidden');
                
                keys.forEach(key => {
                    const value = localStorage.getItem(key);
                    totalBytes += (key.length + value.length) * 2;
                    
                    let projectInfo = PROJECTS.unknown;
                    try {
                        const parsed = JSON.parse(value);
                        if (parsed.PROJECT_ID === 0 || parsed.PROJECT_ID === "0") {
                            projectInfo = PROJECTS["0"];
                            id0Count++;
                        } else if (parsed.PROJECT_ID === 1 || parsed.PROJECT_ID === "1") {
                            projectInfo = PROJECTS["1"];
                            id1Count++;
                        } else {
                            otherCount++;
                        }
                    } catch (e) {
                        otherCount++;
                    }

                    const row = document.createElement('tr');
                    row.className = "hover:bg-slate-50 transition border-b border-slate-100 last:border-none";
                    
                    row.innerHTML = `
                        <td class="p-4">
                            <span class="font-mono text-xs font-bold text-slate-600 bg-slate-100 px-2 py-1 rounded">${key}</span>
                        </td>
                        <td class="p-4">
                            <span class="text-xs font-semibold px-2.5 py-1 rounded-full ${projectInfo.color}">
                                ${projectInfo.name}
                            </span>
                        </td>
                        <td class="p-4">
                            <div class="max-h-24 overflow-y-auto text-xs font-mono text-slate-500 bg-slate-50 p-2 rounded max-w-xs">
                                ${value.length > 500 ? value.substring(0, 500) + '...' : value}
                            </div>
                        </td>
                        <td class="p-4">
                            <div id="summary-${key.replace(/[^a-zA-Z0-9]/g, '_')}" class="text-sm text-slate-600 italic">
                                <div class="loading-spinner"></div>
                            </div>
                        </td>
                        <td class="p-4">
                            <div class="flex gap-2">
                                <button onclick="openEdit('${key}')" class="p-2 text-indigo-600 hover:bg-indigo-50 rounded-lg transition" title="Edit">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/><path d="m15 5 4 4"/></svg>
                                </button>
                                <button onclick="deleteItem('${key}')" class="p-2 text-red-600 hover:bg-red-50 rounded-lg transition" title="Delete">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>
                                </button>
                            </div>
                        </td>
                    `;
                    
                    tableBody.appendChild(row);
                    
                    // Trigger AI Summary
                    triggerSummary(key, value);
                });
            }

            // Update UI
            document.getElementById('stats-id0').innerText = `${id0Count} Items`;
            document.getElementById('stats-id1').innerText = `${id1Count} Items`;
            document.getElementById('stats-other').innerText = `${otherCount} Items`;
            document.getElementById('total-size').innerText = (totalBytes / 1024).toFixed(2);
        }

        async function triggerSummary(key, value) {
            const containerId = `summary-${key.replace(/[^a-zA-Z0-9]/g, '_')}`;
            const summary = await getAISummary(value, key);
            const container = document.getElementById(containerId);
            if (container) container.innerText = summary;
        }

        /**
         * Interaction Handlers
         */
        function openEdit(key) {
            currentEditingKey = key;
            const content = localStorage.getItem(key);
            document.getElementById('modal-title').innerText = `Editing: ${key}`;
            document.getElementById('modal-content').value = content;
            document.getElementById('edit-modal').style.display = 'flex';
            document.getElementById('modal-error').classList.add('hidden');
        }

        function closeModal() {
            document.getElementById('edit-modal').style.display = 'none';
            currentEditingKey = null;
        }

        document.getElementById('save-button').onclick = function() {
            const newValue = document.getElementById('modal-content').value;
            try {
                // Ensure it's valid JSON if we expect it to be
                JSON.parse(newValue);
                localStorage.setItem(currentEditingKey, newValue);
                closeModal();
                refreshData();
            } catch (e) {
                document.getElementById('modal-error').classList.remove('hidden');
            }
        };

        function deleteItem(key) {
            if (confirm(`Are you sure you want to delete "${key}"?`)) {
                localStorage.removeItem(key);
                refreshData();
            }
        }

        function clearAllProjectData() {
            if (confirm("Warning: This will clear ALL local storage data for this origin. Proceed?")) {
                localStorage.clear();
                refreshData();
            }
        }

        // Initialize on load
        window.onload = refreshData;
    </script>
</body>
</html>
